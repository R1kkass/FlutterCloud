syntax = "proto3";

option go_package = "github.com/R1kkass/GoCloudGRPC/gen/go/auth;auth";

package auth;

service AuthGreet {
    rpc Login(LoginRequest) returns (LoginResponse);
    rpc Logout(LogoutRequest) returns (LogoutResponse);
    rpc Refresh(RefreshRequest) returns (RefreshResponse);
    rpc Registration(RegistrationRequest) returns (RegistrationResponse);
    rpc DHConnect(DHConnectRequest) returns (DHConnectResponse);
    rpc DHSecondConnect(DHSecondConnectRequest) returns (DHSecondConnectResponse);
    rpc CheckAuth(Empty) returns (Empty);
    rpc SubmitEmail(SubmitEmailRequest) returns (SubmitEmailResponse);
    rpc SendNewMailKey(SendNewMailKeyRequest) returns (SendNewMailKeyResponse);
};

message RefreshRequest {
    string refresh_token = 1;
    string session_id = 2;
}

message RefreshResponse {
    string access_token = 1;
}

message LoginRequest {
    string email = 1;
    string password = 2;
    string notification_token = 3;
    string name_device = 4;
    string operation_system = 5;
}

message LoginResponse {
    string access_token = 1;
    string refresh_token = 2;
    string session_id = 3;
}

message RegistrationRequest {
    string email = 1;
    string password = 2;
    string name = 3;
}

message RegistrationResponse {

}

message DHConnectRequest {

}

message Empty {}

message DHConnectResponse {
    string p = 1;
    int64 g = 2;
    string b = 3;
}

message DHSecondConnectRequest {
    string a = 1;
}

message DHSecondConnectResponse {
    string message = 1;
}

message SubmitEmailRequest {
    string email = 1;
    string password = 2;
    string key = 3;
    string notification_token = 4;
    string name_device = 5;
    string operation_system = 6;
}

message SubmitEmailResponse {
    string access_token = 1;
    string refresh_token = 2;
    string session_id = 3;
}

message SendNewMailKeyRequest {
    string email = 1;
    string password = 2;
}

message SendNewMailKeyResponse {}

message LogoutResponse {}

message LogoutRequest {
    string refresh_token = 1;
    string session_id = 2;
}
