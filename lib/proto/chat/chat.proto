syntax = "proto3";

option go_package = "github.com/R1kkass/GoCloudGRPC/gen/go/chat;chat";

package chat;

import "google/protobuf/timestamp.proto";
import "user/user.proto";

service ChatGreeter {
    rpc CreateChat(CreateRequestChat) returns (CreateResponseChat);
    rpc StreamGetChat(Empty) returns (stream StreamGetResponseChat);
    rpc CreateSecondaryKey(CreateSecondaryKeyRequest) returns (CreateSecondaryKeyResponse);
    rpc GetSecondaryKey(GetSecondaryKeyRequest) returns (GetSecondaryKeyResponse);
    rpc GetPublicKey(GetPublicKeyRequest) returns (GetPublicKeyResponse);
    rpc AcceptChat(AcceptChatRequest) returns (AcceptChatResponse);
    rpc DisallowChat(DisallowChatRequest) returns (DisallowChatResponse);
    rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse);
    rpc StreamGetMessagesGeneral(Empty) returns (stream StreamGetMessagesGeneralResponse);
    rpc StreamGetMessages(stream StreamGetMessagesRequest) returns (stream StreamGetMessagesResponse);
    rpc GetUnSuccessChats(Empty) returns (GetUnSuccessChatsResponse);
}

enum TypeMessage {
    SEND_MESSAGE = 0;
    READ_MESSAGE = 1;
    UPLOAD_MESSAGE = 2;
    READ_MESSAGE_ALL = 3;
}

message StreamGetMessagesRequest {
    TypeMessage type = 1;
    string text = 2;
    uint32 message_id = 3;
}

message StreamGetMessagesResponse {
    Message message = 1;
    repeated Message messages = 2;
    TypeMessage type = 3;
}

message Empty {}

message StreamGetMessagesGeneralResponse {
    int32 count = 1;
}

message AcceptChatRequest {
    uint32 chat_id = 1;
}

message AcceptChatResponse {}

message DisallowChatRequest {
    uint32 chat_id = 1;
}

message DisallowChatResponse {}

message CreateRequestChat {
    string companionUuid = 1;
}

message CreateResponseChat {
    string text = 1;
    Keys keys = 2;
    uint32 chat_id = 3;
}

message Keys {
    string p = 1;
    int64 g = 2;
}

message StreamGetResponseChat {
    repeated ChatWithUnReadingMessagesCount chats = 1;
}

message GetUnSuccessChatsResponse {
    repeated Chat chats = 1;
}

message ChatWithUnReadingMessagesCount  {
    uint32 id = 1;
    Message message = 2;
    string name_chat = 3;
    repeated user.User users = 4;
    int32 un_reading_messages_count = 5;
}

message Chat {
    uint32 id = 1;
    repeated Message messages = 2;
    string name_chat = 3;
    repeated user.User users = 4;
}

message Message {
    uint32 id = 1;
    google.protobuf.Timestamp created_at = 2;
    google.protobuf.Timestamp updated_at = 3;
    uint32 user_id = 4;
    uint32 chat_id = 5;
    string text = 6;
    user.User user = 7;
    bool status_read = 8;
    repeated MessageFile message_files = 9;
}

message MessageFile {
    uint32 id = 1;
    int64 size = 2;
    string file_name = 3;
    uint32 message_id = 4;
}

message CreateSecondaryKeyRequest {
    uint32 chat_id = 1;
    string key = 2;
}

message CreateSecondaryKeyResponse {
    string message = 1;
}

message GetSecondaryKeyRequest {
    uint32 chat_id = 1;
}

message GetSecondaryKeyResponse {
    string key = 1;
    string p = 2;
}

message GetPublicKeyRequest {
    uint32 chat_id = 1;
}

message GetPublicKeyResponse {
    int64 g = 1;
    string p = 2;
}

message GetMessagesRequest {
    uint32 chatId = 1;
    uint32 page = 2;
    bool init = 3;
}

message GetMessagesResponse {
    repeated Message messages = 1;
    int32 page = 2;
    int32 count_not_read = 3;
}
